version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: skillbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-skillbridge_pro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - skillbridge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-skillbridge_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build:
      context: ./server/services/user-service
      dockerfile: Dockerfile
    container_name: skillbridge-user-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-skillbridge_pro}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skillbridge-network

  # Project Service
  project-service:
    build:
      context: ./server/services/project-service
      dockerfile: Dockerfile
    container_name: skillbridge-project-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-skillbridge_pro}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skillbridge-network

  # Settings Service
  settings-service:
    build:
      context: ./server/services/settings-service
      dockerfile: Dockerfile
    container_name: skillbridge-settings-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-skillbridge_pro}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3008:3008"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skillbridge-network

  # Chat Service
  chat-service:
    build:
      context: ./server/services/chat-service
      dockerfile: Dockerfile
    container_name: skillbridge-chat-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3009
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-skillbridge_pro}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skillbridge-network

  # API Gateway
  api-gateway:
    build:
      context: ./server/api-gateway
      dockerfile: Dockerfile
    container_name: skillbridge-api-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DOCKER_ENV=true
      - API_USER_URL=http://user-service:3006
      - API_PROJECT_URL=http://project-service:3007
      - API_SETTINGS_URL=http://settings-service:3008
      - API_CHAT_URL=http://chat-service:3009
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://yourdomain.com}
    ports:
      - "3005:3005"
    depends_on:
      - user-service
      - project-service
      - settings-service
      - chat-service
    networks:
      - skillbridge-network

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: skillbridge-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api-gateway
    networks:
      - skillbridge-network

volumes:
  postgres_data:

networks:
  skillbridge-network:
    driver: bridge
